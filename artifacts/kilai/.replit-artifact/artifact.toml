kind = "web"
previewPath = "/"
title = "KILAI — Living Microgreens"
version = "1.0.0"
id = "artifacts/kilai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24305

[services.development]
run = "pnpm --filter @workspace/kilai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kilai", "run", "build" ]
publicDir = "artifacts/kilai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24305"
BASE_PATH = "/"
