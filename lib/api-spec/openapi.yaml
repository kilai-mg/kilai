openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: Kilai API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: varieties
    description: Microgreen variety catalog
  - name: trays
    description: Live tray inventory
  - name: adoptions
    description: Tray adoption orders
  - name: bulk
    description: Bulk and gifting enquiries
  - name: stats
    description: Live farm statistics
  - name: auth
    description: OTP-based mobile authentication
  - name: admin
    description: Admin portfolio endpoints

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /varieties:
    get:
      operationId: listVarieties
      tags: [varieties]
      summary: List all varieties
      responses:
        "200":
          description: Variety list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Variety"

  /trays:
    get:
      operationId: listTrays
      tags: [trays]
      summary: List all trays
      responses:
        "200":
          description: Tray list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tray"

  /trays/{id}:
    get:
      operationId: getTray
      tags: [trays]
      summary: Get a single tray
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tray detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tray"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Live farm statistics
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmStats"

  /bulk-inquiries:
    post:
      operationId: createBulkInquiry
      tags: [bulk]
      summary: Submit a bulk enquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkInquiryRequest"
      responses:
        "201":
          description: Enquiry received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkInquiryResponse"

  /adoptions:
    post:
      operationId: createAdoption
      tags: [adoptions]
      summary: Adopt a tray
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdoptionRequest"
      responses:
        "201":
          description: Adoption created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdoptionResponse"
        "409":
          description: No available tray
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/request-otp:
    post:
      operationId: requestOtp
      tags: [auth]
      summary: Request an OTP for a mobile number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpRequest"
      responses:
        "200":
          description: OTP sent (simulated — code returned in dev)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpRequestResponse"
        "400":
          description: Invalid phone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/verify-otp:
    post:
      operationId: verifyOtp
      tags: [auth]
      summary: Verify OTP and create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid or expired OTP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current session user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Destroy current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/adoptions:
    get:
      operationId: adminListAdoptions
      tags: [admin]
      summary: List all adoptions (admin)
      responses:
        "200":
          description: All adoptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminAdoption"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/adoptions/{id}/status:
    patch:
      operationId: adminUpdateAdoptionStatus
      tags: [admin]
      summary: Update adoption status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAdoption"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/trays:
    get:
      operationId: adminListTrays
      tags: [admin]
      summary: List all trays with full detail (admin)
      responses:
        "200":
          description: All trays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tray"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/trays/{id}/status:
    patch:
      operationId: adminUpdateTrayStatus
      tags: [admin]
      summary: Update tray status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tray"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/bulk-inquiries:
    get:
      operationId: adminListBulkInquiries
      tags: [admin]
      summary: List all bulk inquiries (admin)
      responses:
        "200":
          description: All bulk inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminBulkInquiry"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Extended farm stats (admin)
      responses:
        "200":
          description: Extended stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    Variety:
      type: object
      required: [id, name, category, character, priceBase, nutrients, nutrientNote]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
          enum: [tall, short, premium]
        character:
          type: string
        priceBase:
          type: integer
        nutrients:
          type: array
          items:
            type: string
        nutrientNote:
          type: string

    Tray:
      type: object
      required: [id, variety, category, character, nutrients, nutrientNote, day, totalDays, price, status]
      properties:
        id:
          type: integer
        variety:
          type: string
        category:
          type: string
          enum: [tall, short, premium]
        character:
          type: string
        nutrients:
          type: array
          items:
            type: string
        nutrientNote:
          type: string
        day:
          type: integer
        totalDays:
          type: integer
        price:
          type: integer
        status:
          type: string
          enum: [available, adopted, growing, harvested, delivered]
        adoptedBy:
          type: string
          nullable: true

    FarmStats:
      type: object
      required: [available, adopted, growing, total]
      properties:
        available:
          type: integer
        adopted:
          type: integer
        growing:
          type: integer
        total:
          type: integer

    BulkInquiryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        quantity:
          type: string
        occasion:
          type: string
        phone:
          type: string

    BulkInquiryResponse:
      type: object
      required: [id]
      properties:
        id:
          type: integer

    AdoptionRequest:
      type: object
      required: [varietyName, customerName, customerPhone]
      properties:
        varietyName:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        wantTrayAddon:
          type: boolean
          default: false
        wantGuideAddon:
          type: boolean
          default: false

    AdoptionResponse:
      type: object
      required: [id, trayId, customerName, totalRupees, status]
      properties:
        id:
          type: integer
        trayId:
          type: integer
        customerName:
          type: string
        totalRupees:
          type: integer
        status:
          type: string

    OtpRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string

    OtpRequestResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        devOtp:
          type: string
          description: "Only present in development — the OTP code for testing"

    OtpVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
        code:
          type: string

    AuthUser:
      type: object
      required: [id, phone, isAdmin]
      properties:
        id:
          type: integer
        phone:
          type: string
        name:
          type: string
          nullable: true
        isAdmin:
          type: boolean

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AdminAdoption:
      type: object
      required: [id, trayId, customerName, customerPhone, totalRupees, status, createdAt]
      properties:
        id:
          type: integer
        trayId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        wantTrayAddon:
          type: boolean
        wantGuideAddon:
          type: boolean
        totalRupees:
          type: integer
        status:
          type: string
        createdAt:
          type: string
        variety:
          type: string
          nullable: true

    AdminBulkInquiry:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: string
          nullable: true
        occasion:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        createdAt:
          type: string

    AdminStats:
      type: object
      required: [available, adopted, growing, harvested, delivered, total, totalRevenue, pendingAdoptions, confirmedAdoptions]
      properties:
        available:
          type: integer
        adopted:
          type: integer
        growing:
          type: integer
        harvested:
          type: integer
        delivered:
          type: integer
        total:
          type: integer
        totalRevenue:
          type: integer
        pendingAdoptions:
          type: integer
        confirmedAdoptions:
          type: integer
